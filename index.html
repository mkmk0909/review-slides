<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0a0a0a;
    color: #fff;
  }

  /* ===== SLIDE COMMON ===== */
  .slide {
    width: 1920px;
    min-height: 1080px;
    margin: 0 auto 60px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #0D1117 0%, #1a1a2e 50%, #0D1117 100%);
    border: 1px solid #333;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
    z-index: 10;
  }

  /* ===== SLIDE HEADERS ===== */
  .slide-header {
    text-align: center;
    padding: 50px 60px 30px;
    position: relative;
    z-index: 5;
  }

  .slide-header .label {
    display: inline-block;
    background: linear-gradient(135deg, #b8860b, #ffd700);
    color: #0D1117;
    font-size: 18px;
    font-weight: 700;
    padding: 6px 28px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .slide-header h1 {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.2;
    background: linear-gradient(180deg, #fff 30%, #ffd700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.3));
  }

  .slide-header h1 .gold {
    background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .slide-header .subtitle {
    font-size: 26px;
    color: #aaa;
    margin-top: 10px;
    font-weight: 400;
  }

  /* ===== SLIDE 1: 実績者の壁 ===== */
  .wall-full {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    padding: 10px 40px 20px;
  }

  .wall-full img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid rgba(255, 215, 0, 0.15);
  }

  .wall-overlay {
    position: relative;
  }

  .wall-overlay::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 150px;
    background: linear-gradient(transparent, #0D1117);
    pointer-events: none;
  }

  .more-text {
    text-align: center;
    font-size: 22px;
    color: #ffd700;
    padding: 0 0 40px;
    position: relative;
    z-index: 5;
  }

  /* ===== SLIDE 2: 100万以上 GRID ===== */
  .achievement-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 10px 50px 50px;
  }

  .achievement-grid img {
    width: 100%;
    height: auto;
    border-radius: 12px;
    border: 2px solid rgba(255, 215, 0, 0.2);
    transition: transform 0.2s, border-color 0.2s;
  }

  .achievement-grid img:hover {
    transform: scale(1.03);
    border-color: #ffd700;
  }

  /* ===== SLIDE 3: 0→10 WALL ===== */
  .wall-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    padding: 10px 40px 20px;
  }

  .wall-grid img {
    width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid rgba(255, 215, 0, 0.12);
  }

  /* ===== DECORATIONS ===== */
  .laurel {
    font-size: 48px;
    color: #ffd700;
    vertical-align: middle;
  }

  .divider {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #ffd700, transparent);
    margin: 10px auto;
  }

  .corner-deco {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 2px solid rgba(255, 215, 0, 0.2);
    z-index: 2;
  }
  .corner-deco.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
  .corner-deco.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
  .corner-deco.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
  .corner-deco.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

  @media print {
    .slide { page-break-after: always; margin: 0; border: none; }
  }
</style>
